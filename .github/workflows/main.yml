name: CI/CD Pipeline Complete

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  # المهمة الأولى: البناء والرفع (CI) - تمت بنجاح بالأمس
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devops-app:latest

  # المهمة الثانية: التحديث على السيرفر (CD) - هذا هو الجديد!
  deploy-to-server:
    needs: build-and-push # هذه الكلمة تجعل التحديث ينتظر حتى ينجح البناء أولاً
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # الأوامر التي سينفذها GitHub داخل سيرفرك السحري
          script: |
            echo "1. Pulling the latest image..."
            docker pull ghcr.io/${{ github.repository_owner }}/devops-app:latest
            
            echo "2. Stopping and removing the old container..."
            docker stop my-live-app || true
            docker rm my-live-app || true
            
            echo "3. Starting the new container..."
            # ملاحظة: إذا كان البورت 80 مشغولاً، يمكنك تغيير 80:5000 إلى 8081:5000
            docker run -d --name my-live-app -p 80:5000 ghcr.io/${{ github.repository_owner }}/devops-app:latest
            
            echo "4. Cleanup old hidden images to save space..."
            docker image prune -f
